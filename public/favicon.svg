<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="church" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Glass effect -->
  <rect x="40" y="40" width="432" height="200" rx="60" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Church icon -->
  <g transform="translate(256, 280)">
    <!-- Cross on top -->
    <rect x="-12" y="-180" width="24" height="60" rx="4" fill="url(#church)"/>
    <rect x="-30" y="-160" width="60" height="20" rx="4" fill="url(#church)"/>
    
    <!-- Tower -->
    <path d="M-50,-120 L50,-120 L50,80 L-50,80 Z" fill="url(#church)"/>
    
    <!-- Tower roof -->
    <path d="M-60,-120 L0,-170 L60,-120 Z" fill="url(#church)"/>
    
    <!-- Side buildings -->
    <rect x="-130" y="-40" width="80" height="120" rx="8" fill="url(#church)"/>
    <rect x="50" y="-40" width="80" height="120" rx="8" fill="url(#church)"/>
    
    <!-- Door -->
    <rect x="-25" y="20" width="50" height="60" rx="25" fill="#1e3a8a"/>
    
    <!-- Windows -->
    <circle cx="-90" cy="0" r="20" fill="#1e3a8a"/>
    <circle cx="90" cy="0" r="20" fill="#1e3a8a"/>
    <circle cx="0" cy="-60" r="25" fill="#1e3a8a"/>
  </g>
</svg>
